name: Bench

on:
  schedule:
    - cron: "30 3 * * *" # nightly
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  bench:
    name: Benchmark regression gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      # Deterministic, no external services: only the Memory + miniredis benches
      # run in the gate (Postgres/Mongo subtests skip without env vars).
      - name: Benchmark PR head
        run: go test -run '^$' -bench=. -benchmem -count=6 ./lifecycle/ | tee new.txt

      - name: Benchmark base
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git checkout --quiet "$BASE_SHA"
          if [ -f lifecycle/bench_test.go ]; then
            go test -run '^$' -bench=. -benchmem -count=6 ./lifecycle/ | tee old.txt
          else
            echo "base has no benchmarks; skipping regression comparison"
          fi
          git checkout --quiet -

      - name: Compare and gate (ns/op + B/op)
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -f old.txt ]; then
            echo "no baseline (base predates benchmarks); informational only"; exit 0
          fi
          # Self-contained parser/gate (no external tool to keep CI reproducible):
          # average the -count=6 samples per benchmark and fail on >15% ns/op or
          # >20% B/op regression.
          python3 - <<'PY'
          import re, sys
          def parse(path):
              ns, bs = {}, {}
              for line in open(path):
                  m = re.match(r'(Benchmark\S+)\s+\d+\s+([\d.]+)\s+ns/op(?:\s+([\d.]+)\s+B/op)?', line)
                  if not m: continue
                  ns.setdefault(m.group(1), []).append(float(m.group(2)))
                  if m.group(3) is not None:
                      bs.setdefault(m.group(1), []).append(float(m.group(3)))
              avg = lambda d: {k: sum(v)/len(v) for k, v in d.items()}
              return avg(ns), avg(bs)
          old_ns, old_bs = parse('old.txt')
          new_ns, new_bs = parse('new.txt')
          bad = []
          for k, nv in new_ns.items():
              if k in old_ns and old_ns[k] > 0 and nv > old_ns[k]*1.15:
                  bad.append(f"{k}: {old_ns[k]:.0f} -> {nv:.0f} ns/op (+{(nv/old_ns[k]-1)*100:.1f}%)")
          for k, nv in new_bs.items():
              if k in old_bs and old_bs[k] > 0 and nv > old_bs[k]*1.20:
                  bad.append(f"{k}: {old_bs[k]:.0f} -> {nv:.0f} B/op (+{(nv/old_bs[k]-1)*100:.1f}%)")
          if bad:
              print("benchmark regression(s):"); print("\n".join(bad)); sys.exit(1)
          print("no significant benchmark regressions (ns/op or B/op)")
          PY
